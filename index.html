<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AÇÃO PIX | Helder da Bet</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00FF6A;
    --green-dark: #00C44F;
    --black: #0a0a0a;
    --card: #181818;
    --border: #222;
    --white: #ffffff;
    --gray: #aaaaaa;
    --error: #ff4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
  }

  .container { max-width: 480px; margin: 0 auto; padding: 0 20px 60px; }
  .header { text-align: center; padding: 40px 0 30px; }
  .logo-ring { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--green); padding: 3px; margin: 0 auto 16px; box-shadow: 0 0 30px rgba(0,255,106,0.3); }
  .logo-placeholder { width: 100%; height: 100%; border-radius: 50%; background: linear-gradient(135deg, #00C44F, #005c25); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: #000; }
  .header-tag { background: var(--green); color: #000; font-size: 10px; font-weight: 900; padding: 4px 12px; border-radius: 2px; margin-bottom: 10px; display: inline-block; }
  .header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 52px; line-height: 1; }
  .header h1 span { color: var(--green); }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px 24px; margin-top: 20px; }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 8px; color: var(--gray); text-transform: uppercase; }
  input { width: 100%; background: #0f0f0f; border: 1.5px solid var(--border); border-radius: 10px; padding: 14px 16px; color: white; font-size: 14px; }
  input:focus { border-color: var(--green); outline: none; }
  input.error { border-color: var(--error); }

  .pix-types { display: flex; gap: 8px; margin-bottom: 10px; }
  .pix-type-btn { flex: 1; padding: 10px; background: #0f0f0f; border: 1.5px solid var(--border); border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 11px; }
  .pix-type-btn.active { border-color: var(--green); color: var(--green); background: rgba(0,255,106,0.1); }

  .btn { width: 100%; background: var(--green); color: #000; border: none; padding: 16px; font-size: 20px; font-family: 'Bebas Neue', sans-serif; border-radius: 10px; margin-top: 10px; cursor: pointer; }
  .btn:disabled { opacity: 0.6; }

  .alert { display: none; padding: 14px; background: rgba(255,68,68,0.15); border: 1px solid #ff4444; border-radius: 10px; color: #ff7777; margin-bottom: 16px; }
  .alert.show { display: block; }

  .success-screen { display: none; text-align: center; padding: 50px 20px; }
  .success-screen.show { display: block; }
  .success-icon { font-size: 60px; margin-bottom: 20px; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo-ring"><div class="logo-placeholder">HB</div></div>
    <div class="header-tag">Helder da Bet</div>
    <h1>AÇÃO <span>PIX</span></h1>
    <p>Preencha seus dados para receber</p>
  </div>

  <div class="card" id="formCard">
    <div class="alert alert-error" id="alertError">
      <span id="alertErrorMsg"></span>
    </div>

    <div class="field">
      <label>WhatsApp</label>
      <input type="tel" id="whatsapp" placeholder="(11) 99999-9999" maxlength="15">
    </div>

    <div class="field">
      <label>Nome Completo</label>
      <input type="text" id="nome" placeholder="Seu nome completo">
    </div>

    <div class="field">
      <label>Chave PIX</label>
      <div class="pix-types">
        <button class="pix-type-btn active" onclick="setPixType('cpf')">CPF</button>
        <button class="pix-type-btn" onclick="setPixType('telefone')">Telefone</button>
        <button class="pix-type-btn" onclick="setPixType('email')">E-mail</button>
      </div>
      <input type="text" id="pix" placeholder="Digite seu CPF">
    </div>

    <button class="btn" id="submitBtn" onclick="handleSubmit()">
      QUERO RECEBER MEU PIX 💸
    </button>
  </div>

  <div class="success-screen" id="successScreen">
    <div class="success-icon">✅</div>
    <h2>DADOS ENVIADOS!</h2>
    <p>Seus dados foram recebidos com sucesso.<br>Em breve você receberá seu PIX!</p>
  </div>
</div>

<script>
  const CONFIG = {
    SCRIPT_URL: "https://script.google.com/macros/s/AKfycbwSzOs2z_Cau-52lMij6cl6as8GeAS-3HLv9dYtG5gGOP8j2dvrUujhC3Y5l3rdOgAm/exec"
  };

  const params = new URLSearchParams(window.location.search);
  const analista = (params.get('analista') || 'kaique').toLowerCase();

  let pixType = 'cpf';
  let submitted = false;

  function setPixType(type) {
    pixType = type;
    document.querySelectorAll('.pix-type-btn').forEach(btn => btn.classList.remove('active'));
    event.currentTarget.classList.add('active');

    const input = document.getElementById('pix');
    input.value = '';
    if (type === 'cpf') input.placeholder = 'Digite seu CPF';
    else if (type === 'telefone') input.placeholder = '(11) 99999-9999';
    else input.placeholder = 'seu@email.com';
  }

  // Máscaras simples
  document.getElementById('whatsapp').addEventListener('input', function() {
    let v = this.value.replace(/\D/g, '').substring(0,11);
    if (v.length > 6) this.value = `(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
    else if (v.length > 2) this.value = `(${v.slice(0,2)}) ${v.slice(2)}`;
  });

  function clearErrors() {
    document.querySelectorAll('input').forEach(i => i.classList.remove('error'));
    document.getElementById('alertError').classList.remove('show');
  }

  function showError(field, message) {
    document.getElementById(field).classList.add('error');
    document.getElementById('alertErrorMsg').textContent = message;
    document.getElementById('alertError').classList.add('show');
  }

  async function handleSubmit() {
    if (submitted) return;

    const whatsapp = document.getElementById('whatsapp').value.trim();
    const nome = document.getElementById('nome').value.trim();
    const pix = document.getElementById('pix').value.trim();

    clearErrors();

    if (whatsapp.replace(/\D/g,'').length < 10) return showError('whatsapp', 'WhatsApp inválido');
    if (nome.length < 5) return showError('nome', 'Digite seu nome completo');
    if (!pix) return showError('pix', 'Chave PIX obrigatória');

    const btn = document.getElementById('submitBtn');
    btn.textContent = "ENVIANDO...";
    btn.disabled = true;

    try {
      const payload = {
        whatsapp: whatsapp.replace(/\D/g, ''),
        nome: nome,
        pix: pix,
        analista: analista
      };

      const response = await fetch(CONFIG.SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const result = await response.json();

      if (result.status === 'success') {
        submitted = true;
        document.getElementById('formCard').style.display = 'none';
        document.getElementById('successScreen').classList.add('show');
      } else if (result.status === 'duplicate') {
        showError('whatsapp', result.field === 'whatsapp' ? 'WhatsApp já cadastrado!' : 'PIX já cadastrado!');
      } else {
        showError('whatsapp', result.message || 'Erro ao salvar dados');
      }
    } catch (err) {
      console.error(err);
      showError('whatsapp', 'Erro de conexão. Tente novamente.');
    } finally {
      btn.textContent = "QUERO RECEBER MEU PIX 💸";
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
